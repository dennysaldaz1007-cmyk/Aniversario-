<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz aniversario</title>

<style>

body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:Arial,sans-serif;

background:linear-gradient(135deg,#ffd166,#ff9a44,#ff6b6b);

padding:25px;

box-sizing:border-box;

}

.caja{

background:white;

width:100%;

max-width:450px;

padding:35px;

border-radius:25px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

}

h1{

font-size:32px;

color:#333;

}

p{

font-size:20px;

line-height:1.6;

color:#555;

}

button{

margin-top:25px;

padding:14px 30px;

font-size:18px;

border:none;

border-radius:30px;

cursor:pointer;

background:#333;

color:white;

}

input{

width:90%;

padding:15px;

font-size:18px;

border-radius:15px;

border:2px solid #ddd;

margin-top:20px;

}

</style>

</head>

<body>

<div class="caja">

<h1 id="titulo"></h1>

<p id="texto"></p>

<input id="respuesta" style="display:none;">

<br>

<button id="boton" onclick="siguiente()">Siguiente</button>

</div>

<script>

const paginas=[

{

titulo:"¡Feliz aniversario, Vargas!",

texto:"No puedo creer que ya cumplimos un año juntos."

},

{

titulo:"",

texto:"A veces pienso en todo lo que nos costó estar juntos y me da gusto que nos aferramos a que funcionara."

},

{

titulo:"",

texto:"Amo todo de ti. Y este año ha sido lo mejor de mi vida, me encanta cómo me siento cuando estoy contigo, como puedo hacer cualquier tontería contigo y como tú me haces reír con todas tus tonterías."

},

{

titulo:"",

texto:"Y amo todavía más tener a alguien que sé que me ama y me conoce MUY bien."

},

{

titulo:"",

texto:"Ya casi vienes a Corea, y aunque solo han pasado unos días te extraño demasiado, pero estamos a punto de tener nuestro primer viaje juntos."

},

{

titulo:"",

texto:"Y como me conoces tanto… sé que vas a contestar bien esta pregunta y así vas a ganarte la sorpresa."

},

{

titulo:"Pregunta",

texto:"¿Cuál es la canción de Disney que más canto recientemente? (Y la respuesta tiene que ver con tu sorpresa)."

}

];

let pagina=0;

const titulo=document.getElementById("titulo");

const texto=document.getElementById("texto");

const boton=document.getElementById("boton");

const respuesta=document.getElementById("respuesta");

function mostrar(){

titulo.innerHTML=paginas[pagina].titulo;

texto.innerHTML=paginas[pagina].texto;

if(pagina===6){

respuesta.style.display="inline";

boton.innerHTML="Responder";

}

}

function siguiente(){

if(pagina<6){

pagina++;

mostrar();

return;

}

let r=respuesta.value.toLowerCase();

if(

r.includes("froyo yolo")

||

r.includes("froyo yolo de liv y maddie")

){

titulo.innerHTML="¡CORRECTO!";

texto.innerHTML="La canción es 'Froyo Yolo de Liv y Maddie'. Ganaste una Dairy Queen. Y te va a llegar hoy, ya está programada, pero no le puse hora, así que mándame un mensaje diciéndome a qué hora vas a estar en tu casa o te la mandaré a la hora que se me dé la gana.";

}

else{

titulo.innerHTML="¡Te odio! Eres un horrible novio.";

texto.innerHTML="Pensé que me conocías un poquito mejor. La respuesta era 'Froyo Yolo de Liv y Maddie'. Pero no te preocupes, igual te voy a mandar la sorpresa (solo porque ya la programé, porque no la mereces).";

}

respuesta.style.display="none";

boton.style.display="none";

}

mostrar();

</script>

</body>

</html>
