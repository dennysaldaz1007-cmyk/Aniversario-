<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>+1 mes juntos</title>

<style>

body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:Arial,sans-serif;

background:linear-gradient(135deg,#c8e6c9,#f8e1c4,#f5c6aa);

padding:25px;

box-sizing:border-box;

}

.caja{

background:white;

width:100%;

max-width:450px;

padding:35px;

border-radius:25px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

}

h1{

font-size:32px;

color:#333;

}

p{

font-size:20px;

line-height:1.6;

color:#555;

}

button{

margin-top:25px;

padding:14px 30px;

font-size:18px;

border:none;

border-radius:30px;

cursor:pointer;

background:#333;

color:white;

}

input{

width:90%;

padding:15px;

font-size:18px;

border-radius:15px;

border:2px solid #ddd;

margin-top:20px;

}

</style>

</head>

<body>

<div class="caja">

<h1 id="titulo"></h1>

<p id="texto"></p>

<input id="respuesta" style="display:none;">

<br>

<button id="boton" onclick="siguiente()">Siguiente</button>

</div>

<script>

const paginas=[

{

titulo:"+1 mes juntos!!",

texto:"Ya pasó otro mes y el mes pasado vivimos MUCHAS cosas nuevas juntos que nunca esperé que viviéramos, y la verdad, me sigue haciendo muy feliz poder seguir viviendo más experiencias así contigo."

},

{

titulo:"",

texto:"A veces me da risa pensar en cómo éramos antes de ser novios."

},

{

titulo:"",

texto:"Porque cuando éramos amigos, me acuerdo que no perdías ninguna oportunidad para burlarte de mí."

},

{

titulo:"",

texto:"Y que (aunque fuera un POCO cierto) te la pasabas diciéndome basic white girl."

},

{

titulo:"",

texto:"Y sí, admito que en esa época (YA NO) sí tenía algunas características que se parecían a una basic white girl y que era un poco predecible."

},

{

titulo:"",

texto:"Pero como me conoces MUY bien, estoy segura de que vas a contestar correctamente esta pregunta y, además de tu sorpresa, vas a ganar que tu novia no se enoje. ¡2x1!"

},

{

titulo:"Pregunta",

texto:"Cuando decías que era una basic white girl y antes de ser fit (casi toda la prepa), ¿cuál era el único lugar al que NUNCA perdonaba ir todos los días, así fuera súper tarde?"

}

];

let pagina=0;

const titulo=document.getElementById("titulo");

const texto=document.getElementById("texto");

const boton=document.getElementById("boton");

const respuesta=document.getElementById("respuesta");

function mostrar(){

titulo.innerHTML=paginas[pagina].titulo;

texto.innerHTML=paginas[pagina].texto;

if(pagina===6){

respuesta.style.display="inline";

respuesta.placeholder="Escribe tu respuesta aquí";

boton.innerHTML="Responder";

}

}

function siguiente(){

if(pagina<6){

pagina++;

mostrar();

return;

}

let r=respuesta.value.toLowerCase();

if(r.includes("starbucks")){

titulo.innerHTML="¡CORRECTO!";

texto.innerHTML="Sí, la respuesta era Starbucks. Y como ahora eres mi novio, ya te volviste igual de girly. Y sí, lo que te voy a mandar es algo de Starbucks. Como el mes pasado, mándame a qué hora vas a estar en tu casa (aunque no tendrías que hacerlo si aceptaras bajar Life360, pero al parecer me odias y me eres infiel).";

}

else{

titulo.innerHTML="¡Eres horrible! Bye.";

texto.innerHTML="Pensé que me amabas. La respuesta era Starbucks. Pero no te preocupes, igual te voy a mandar la sorpresa (solo porque ya la programé, porque no la mereces).";

}

respuesta.style.display="none";

boton.style.display="none";

}

mostrar();

</script>

</body>

</html>
